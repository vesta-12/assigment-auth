openapi: 3.0.0
info:
  title: Simple Auth API
  version: 1.0.0
  description: API documentation for login, registration, and password reset.

servers:
  - url: http://localhost:8080
    description: Local server

paths:
  /login:
    post:
      summary: User login
      description: Authenticates a user using username and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: sofiya12
                password:
                  type: string
                  example: gen1221
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: login successful
                  token:
                    type: string
                    example: sfgkjbHGOUYvjHLKjhnlvHBNkjnhljugkuvJGVuftfgsfgkjbHGOUYvjHLKjhnlvHBNkjnhljugkuvJGVuftfgsfgkjbHGOUYvjHLKjhnlvHBNkjnhljugkuvJGVuftfg
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: incorrect username or password

  /register:
    post:
      summary: User registration
      description: Creates a new user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  example: darya33
                email:
                  type: string
                  format: email
                  example: darya.ivaikina@gmail.com
                password:
                  type: string
                  example: linear.reg.33!
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: registration successful
        '400':
          description: incorrect input or user already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: this user already exists

  /reset-password:
    post:
      summary: Reset password
      description: Resets the password for an existing user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - newPassword
              properties:
                email:
                  type: string
                  format: email
                  example: yevgenii.205@gmail.com
                newPassword:
                  type: string
                  example: java5!
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: password reset successful
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: user not found